name: GnuPG 自动构建

on:
  schedule:
    # 每天 UTC 5:00 = 北京时间 13:00
    - cron: '0 5 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  # ========== Job 1: 检查版本 ==========
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      raw_version: ${{ steps.version.outputs.raw }}
      should_build: ${{ steps.should_build.outputs.value }}
    steps:
      - name: 检查分支
        uses: actions/checkout@v7

      - name: 更新系统 CA 证书
        run: |
          sudo apt update -y
          sudo apt install --reinstall -y ca-certificates

      - name: 安装 Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: 爬取 GnuPG 官网获取最新版本号和签名密钥信息
        id: version
        run: |
          python .github/scripts/check_version.py > version_info.json
          cat version_info.json
          RAW_VERSION=$(python -c "import json; print(json.load(open('version_info.json'))['version'])")
          echo "value=v${RAW_VERSION}" >> $GITHUB_OUTPUT
          echo "raw=${RAW_VERSION}" >> $GITHUB_OUTPUT

      - name: 检查 Tag 是否存在
        id: check-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.value }}"
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" --jq '.ref' 2>/dev/null; then
            echo "Tag ${TAG} 已存在"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag ${TAG} 不存在"
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 检查 Release 是否有 Asset
        id: check-assets
        if: steps.check-tag.outputs.tag_exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.value }}"
          ASSET_COUNT=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.assets | length' 2>/dev/null || echo "0")
          echo "Asset 数量: ${ASSET_COUNT}"
          if [ "${ASSET_COUNT}" -gt 0 ]; then
            echo "Release 已有构建产物，跳过构建"
            echo "has_assets=true" >> $GITHUB_OUTPUT
          else
            echo "Release 没有构建产物，需要构建"
            echo "has_assets=false" >> $GITHUB_OUTPUT
          fi

      - name: 判断是否需要构建
        id: should_build
        run: |
          if [ "${{ steps.check-tag.outputs.tag_exists }}" = "false" ] \
             || [ "${{ steps.check-assets.outputs.has_assets }}" = "false" ]; then
            echo "需要构建"
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "无需构建"
            echo "value=false" >> $GITHUB_OUTPUT
          fi

  # ========== Job 2: 多平台并行构建 ==========
  build:
    needs: check-version
    if: ${{ needs.check-version.outputs.should_build == 'true' }}
    timeout-minutes: 120
    strategy:
      matrix:
        config:
          # --- Linux amd64 (静态链接, 跨发行版, +.deb) ---
          - os: ubuntu-latest
            name: linux-amd64
            targetos: native
            artifact_name: gnupg-linux-amd64
            deb_arch: amd64
            static: 1

          # --- Linux ARM64 (原生 ARM, +.deb) ---
          - os: ubuntu-24.04-arm
            name: linux-arm64
            targetos: native
            artifact_name: gnupg-linux-arm64
            deb_arch: arm64
            static: 1

          # --- Windows 64-bit (含 DLL) ---
          - os: ubuntu-latest
            name: windows-w64
            targetos: w32
            w32version: w64
            artifact_name: gnupg-windows-w64
            static: 0

          # --- Windows 64-bit (第三方依赖静态链接, 仅 exe) ---
          - os: ubuntu-latest
            name: windows-w64-static
            targetos: w32
            w32version: w64
            artifact_name: gnupg-windows-w64-static
            static: 1
      fail-fast: false

    runs-on: ${{ matrix.config.os }}
    name: 构建 ${{ matrix.config.name }}
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: 更新系统 CA 证书
        if: runner.os == 'Linux'
        run: |
          sudo apt update -y
          sudo apt install --reinstall -y ca-certificates

      - name: 下载 GnuPG ${{ needs.check-version.outputs.version }} 源码及签名
        run: |
          RAW_VERSION="${{ needs.check-version.outputs.raw_version }}"
          TARBALL="gnupg-${RAW_VERSION}.tar.bz2"
          echo "正在从 gnupg.org 下载源码、签名文件和官方公钥块 (HTTPS, 证书校验已确保)..."
          curl -fSLO "https://www.gnupg.org/ftp/gcrypt/gnupg/${TARBALL}"
          curl -fSLO "https://www.gnupg.org/ftp/gcrypt/gnupg/${TARBALL}.sig"
          curl -fSLO "https://gnupg.org/signature_key.asc"

      - name: 导入 GnuPG 发布签名密钥并验证源码完整性
        run: |
          RAW_VERSION="${{ needs.check-version.outputs.raw_version }}"
          TARBALL="gnupg-${RAW_VERSION}.tar.bz2"
          SIG_FILE="${TARBALL}.sig"

          if [ ! -f "${SIG_FILE}" ]; then
            echo "WARNING: 无 .sig 文件，跳过签名验证"
          else
            GNUPGHOME="${RUNNER_TEMP}/gnupg_home"
            mkdir -p -m 0700 "${GNUPGHOME}"
            export GNUPGHOME

            # 导入 GnuPG 官方发布的完整公钥块 (signature_key.asc)
            echo "导入 GnuPG 官方发布的签名密钥块 (signature_key.asc)..."
            gpg --batch --import signature_key.asc 2>&1 | head -n 10
            echo ""

            # 执行签名验证
            echo "正在验证 ${TARBALL} 签名..."
            if gpg --batch --verify "${SIG_FILE}" "${TARBALL}"; then
              # 提取实际签名者信息
              SIGNER=$(gpg --batch --verify "${SIG_FILE}" "${TARBALL}" 2>&1 \
                | grep 'Good signature' | sed 's/.*"\(.*\)".*/\1/' || echo "unknown")
              echo "签名验证通过！签名者: ${SIGNER}"
            else
              echo "ERROR: 签名验证失败! ${TARBALL} 可能被篡改。"
              echo "  请检查 https://www.gnupg.org/download/integrity_check.html"
              exit 1
            fi
          fi

      - name: 解压源码
        run: |
          RAW_VERSION="${{ needs.check-version.outputs.raw_version }}"
          TARBALL="gnupg-${RAW_VERSION}.tar.bz2"
          echo "解压 ${TARBALL}..."
          tar -xjf "${TARBALL}"
          echo "GNUPG_SRCDIR=${GITHUB_WORKSPACE}/gnupg-${RAW_VERSION}" >> $GITHUB_ENV

      - name: 安装构建依赖 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make autoconf automake libtool \
            gettext texinfo wget \
            bzip2 xz-utils

      - name: 安装 MinGW 交叉编译工具链 (Windows 交叉编译)
        if: matrix.config.targetos == 'w32'
        run: |
          sudo apt-get install -y mingw-w64

      - name: 构建 GnuPG (${{ matrix.config.name }})
        run: |
          cd "${GNUPG_SRCDIR}"
          if [ "${{ matrix.config.targetos }}" = "w32" ]; then
            echo "=== Windows 交叉编译 (${{ matrix.config.w32version }}, STATIC=${{ matrix.config.static }}) ==="
            STATIC_FLAG=""
            if [ "${{ matrix.config.static }}" = "1" ]; then
              STATIC_FLAG="STATIC=1"
              # STATIC=1 only changes a subset of speedo.mk defaults. Override
              # every bundled library and the zlib make-only build explicitly.
              # Windows system API DLLs remain OS-provided imports; the
              # post-build import check rejects redistributable DLLs.
              printf '%s\n' \
                'speedo_pkg_npth_configure = --enable-static --disable-shared' \
                'speedo_pkg_libgpg_error_configure = --enable-static --disable-shared' \
                'speedo_pkg_libassuan_configure = --enable-static --disable-shared' \
                'speedo_pkg_libgcrypt_configure = --enable-static --disable-shared' \
                'speedo_pkg_libksba_configure = --enable-static --disable-shared' \
                'speedo_pkg_ntbtls_configure = --enable-static --disable-shared' \
                'speedo_pkg_sqlite_configure = --enable-static --disable-shared' \
                'speedo_pkg_zlib_make_args = -fwin32/Makefile.gcc PREFIX=$(host)- SHARED_MODE=0 LDFLAGS=-static-libgcc' \
                'speedo_pkg_zlib_make_args_inst = -fwin32/Makefile.gcc BINARY_PATH=$(idir)/bin INCLUDE_PATH=$(idir)/include LIBRARY_PATH=$(idir)/lib SHARED_MODE=0' \
                'speedo_pkg_gnupg_configure = --disable-g13 --enable-ntbtls --disable-tpm2d --disable-shared LDFLAGS=-static LIBS=-lws2_32' \
                'speedo_pkg_gnupg_extracflags = -static -static-libgcc -static-libstdc++' \
                'speedo_pkg_pinentry_configure = --disable-pinentry-qt5 --disable-pinentry-qt --disable-pinentry-fltk --disable-pinentry-tty CPPFLAGS=-I$(idir)/include LDFLAGS=-L$(idir)/lib LIBS=-lws2_32' \
                'speedo_pkg_pinentry_extracflags = -static -static-libgcc -static-libstdc++' \
                > config.mk
              echo "=== 已写入 Windows 完全静态依赖配置 ==="
            fi
            BUILD_LOG="${RUNNER_TEMP}/gnupg-build-${{ matrix.config.name }}.log"
            make -f build-aux/speedo.mk \
              TARGETOS=w32 WHAT=release UPD_SWDB=1 ${STATIC_FLAG} \
              W32VERSION=${{ matrix.config.w32version }} \
              all 2>&1 | tee "${BUILD_LOG}"
            test "${PIPESTATUS[0]}" -eq 0
            if [ "${{ matrix.config.static }}" = "1" ]; then
              if grep -Fq 'Building without SQLite support - TOFU and Keyboxd disabled' "${BUILD_LOG}"; then
                echo "ERROR: configure 禁用了 SQLite/keyboxd"
                exit 1
              fi
              if ! grep -Eq '^[[:space:]]*Keyboxd:[[:space:]]+yes[[:space:]]*$' "${BUILD_LOG}"; then
                echo "ERROR: configure summary 未确认 Keyboxd: yes"
                grep -E 'SQLite|Keyboxd|TOFU' "${BUILD_LOG}" || true
                exit 1
              fi
              echo "SQLite/keyboxd configure 检查通过"
            fi
          else
            echo "=== Linux 静态编译 ==="
            make -f build-aux/speedo.mk native STATIC=1 \
              speedo_pkg_ntbtls_configure="--disable-shared"
          fi

      - name: 检测并测试构建产物
        id: check-binaries
        run: |
          INST_DIR="${GNUPG_SRCDIR}/PLAY/inst"
          if [ ! -d "${INST_DIR}/bin" ]; then
            echo "ERROR: 未找到构建产物目录 ${INST_DIR}/bin!"
            exit 1
          fi
          echo "构建产物列表:"
          if [ "${{ matrix.config.targetos }}" = "w32" ]; then
            find "${INST_DIR}/bin" "${INST_DIR}/libexec" -type f 2>/dev/null | sort
            if [ "${{ matrix.config.static }}" = "1" ]; then
              mapfile -t INSTALLED_EXE_REL < <(
                find "${INST_DIR}" -type f -iname '*.exe' \
                  \( -path "${INST_DIR}/bin/*" -o -path "${INST_DIR}/libexec/*" \) \
                  -printf '%P\n' | sort -u
              )
              if [ "${#INSTALLED_EXE_REL[@]}" -eq 0 ]; then
                echo "ERROR: 源码构建没有安装任何 Windows executable"
                exit 1
              fi
              printf '%s\n' "${INSTALLED_EXE_REL[@]}" > "${RUNNER_TEMP}/installed-exe.txt"
              if ! grep -Fxq 'libexec/keyboxd.exe' "${RUNNER_TEMP}/installed-exe.txt"; then
                echo "ERROR: 源码构建必须将 keyboxd.exe 安装到 libexec/；实际 executable 清单为:"
                cat "${RUNNER_TEMP}/installed-exe.txt"
                exit 1
              fi
              REQUIRED_EXE_NAMES=(
                gpg.exe gpgv.exe gpgsm.exe gpg-agent.exe dirmngr.exe
                gpgconf.exe gpg-connect-agent.exe gpg-card.exe gpgtar.exe
                pinentry-w32.exe
              )
              for required_exe in "${REQUIRED_EXE_NAMES[@]}"; do
                if ! awk -v required="${required_exe}" '
                  BEGIN { found = 0 }
                  { name = $0; sub(/^.*\//, "", name); if (tolower(name) == tolower(required)) found = 1 }
                  END { exit(found ? 0 : 1) }
                ' "${RUNNER_TEMP}/installed-exe.txt"; then
                  echo "ERROR: 缺少 Windows 核心组件 ${required_exe}"
                  cat "${RUNNER_TEMP}/installed-exe.txt"
                  exit 1
                fi
              done
              if find "${INST_DIR}" -type f -iname '*.dll' 2>/dev/null | grep -q .; then
                echo "ERROR: Windows static build produced a DLL"
                find "${INST_DIR}" -type f -iname '*.dll' -print
                exit 1
              fi
              echo "Windows static executable 清单 (${#INSTALLED_EXE_REL[@]} 个):"
              cat "${RUNNER_TEMP}/installed-exe.txt"
            fi
          else
            find "${INST_DIR}/bin" -type f -executable | sort
          fi
          echo "found=true" >> $GITHUB_OUTPUT

          echo ""
          echo "=== 测试 gpg --version ==="
          if [ "${{ matrix.config.targetos }}" = "w32" ]; then
            file "${INST_DIR}/bin/gpg.exe"
            if [ "${{ matrix.config.static }}" = "1" ]; then
              echo "=== 检查 Windows static PE 导入表 ==="
              declare -A SYSTEM_DLLS=(
                [advapi32.dll]=1 [avrt.dll]=1 [bcrypt.dll]=1
                [comctl32.dll]=1 [comdlg32.dll]=1 [crypt32.dll]=1
                [dnsapi.dll]=1 [dwmapi.dll]=1 [gdi32.dll]=1
                [imm32.dll]=1 [iphlpapi.dll]=1 [kernel32.dll]=1
                [mpr.dll]=1 [msvcrt.dll]=1 [ncrypt.dll]=1
                [netapi32.dll]=1 [ntdll.dll]=1 [ole32.dll]=1
                [oleacc.dll]=1 [oleaut32.dll]=1 [psapi.dll]=1
                [rpcrt4.dll]=1 [secur32.dll]=1 [security.dll]=1
                [setupapi.dll]=1 [shell32.dll]=1 [shlwapi.dll]=1
                [user32.dll]=1
                [userenv.dll]=1 [version.dll]=1 [winhttp.dll]=1
                [wininet.dll]=1 [winmm.dll]=1 [wldap32.dll]=1
                [ws2_32.dll]=1
              )
              while IFS= read -r exe; do
                echo "--- ${exe} ---"
                imports=$(x86_64-w64-mingw32-objdump -p "${exe}" | awk '/DLL Name:/ {print tolower($3)}')
                while IFS= read -r dll; do
                  [ -n "${dll}" ] || continue
                  case "${dll}" in
                    api-ms-win-*.dll|ext-ms-win-*.dll) continue ;;
                  esac
                  if [ -z "${SYSTEM_DLLS["${dll}"]}" ]; then
                    echo "ERROR: non-system DLL import in ${exe}: ${dll}"
                    exit 1
                  fi
                done <<< "${imports}"
              done < <(find "${INST_DIR}" -type f -iname '*.exe' 2>/dev/null | sort)
              echo "Windows static PE 导入检查通过: 仅包含 Windows 系统 DLL"
            else
              echo "(Windows 交叉编译产物, 跳过本地运行测试)"
            fi
          else
            export LD_LIBRARY_PATH="${INST_DIR}/lib:${LD_LIBRARY_PATH}"
            "${INST_DIR}/bin/gpg" --version
            echo ""
            "${INST_DIR}/bin/gpg" --list-config || true
          fi

      - name: 打包构建产物
        run: |
          ARTIFACT="${{ matrix.config.artifact_name }}"
          INST_DIR="${GNUPG_SRCDIR}/PLAY/inst"
          rm -rf "${ARTIFACT}" "${ARTIFACT}-deb"
          mkdir -p "${ARTIFACT}/bin"

          if [ "${{ matrix.config.targetos }}" = "w32" ]; then
            runtime_destinations() {
              local rel="$1"
              local name="${rel##*/}"

              case "${rel}" in
                bin/*|libexec/*) : ;;
                *)
                  echo "ERROR: 不支持的 Windows executable 安装路径: ${rel}" >&2
                  return 1
                  ;;
              esac

              case "${name}" in
                gpg-agent.exe) printf '%s\n' 'bin/agent/gpg-agent.exe' ;;
                gpg-preset-passphrase.exe) printf '%s\n' 'bin/agent/gpg-preset-passphrase.exe' ;;
                gpg-protect-tool.exe) printf '%s\n' 'bin/agent/gpg-protect-tool.exe' ;;
                scdaemon.exe) printf '%s\n' 'bin/scd/scdaemon.exe' ;;
                keyboxd.exe) printf '%s\n' 'bin/kbx/keyboxd.exe' ;;
                dirmngr.exe) printf '%s\n' 'bin/dirmngr/dirmngr.exe' ;;
                dirmngr_ldap.exe) printf '%s\n' 'bin/dirmngr/dirmngr_ldap.exe' ;;
                dirmngr-client.exe) printf '%s\n' 'bin/dirmngr/dirmngr-client.exe' ;;
                gpg-check-pattern.exe) printf '%s\n' 'bin/tools/gpg-check-pattern.exe' ;;
                gpg-connect-agent.exe) printf '%s\n' 'bin/tools/gpg-connect-agent.exe' ;;
                gpgconf.exe) printf '%s\n' 'bin/tools/gpgconf.exe' ;;
                gpg-card.exe) printf '%s\n' 'bin/tools/gpg-card.exe' ;;
                gpgtar.exe) printf '%s\n' 'bin/tools/gpgtar.exe' ;;
                gpg-wks-client.exe) printf '%s\n' 'bin/tools/gpg-wks-client.exe' ;;
                gpgsm.exe) printf '%s\n' 'bin/sm/gpgsm.exe' ;;
                gpg.exe) printf '%s\n' 'bin/g10/gpg.exe' ;;
                gpgv.exe) printf '%s\n' 'bin/g10/gpgv.exe' ;;
                pinentry.exe|pinentry-w32.exe) printf '%s\n' 'bin/pinentry-basic.exe' ;;
                *)
                  case "${rel}" in
                    libexec/*) printf 'bin/%s\n' "${name}" ;;
                    *) printf '%s\n' "${rel}" ;;
                  esac
                  ;;
              esac
            }

            declare -A RUNTIME_DEST_SOURCE=()
            copy_runtime_executable() {
              local source="$1"
              local dest_rel="$2"
              local existing="${RUNTIME_DEST_SOURCE[${dest_rel}]-}"

              mkdir -p "${ARTIFACT}/$(dirname "${dest_rel}")"
              if [ -n "${existing}" ]; then
                if ! cmp -s "${existing}" "${source}"; then
                  echo "ERROR: executable destination collision with different contents: ${dest_rel}" >&2
                  echo "  first:  ${existing}" >&2
                  echo "  second: ${source}" >&2
                  exit 1
                fi
                return 0
              fi
              cp "${source}" "${ARTIFACT}/${dest_rel}"
              RUNTIME_DEST_SOURCE["${dest_rel}"]="${source}"
            }

            if [ "${{ matrix.config.static }}" = "1" ]; then
              mapfile -t INSTALLED_EXE < <(
                find "${INST_DIR}/bin" "${INST_DIR}/libexec" -type f -iname '*.exe' | sort
              )
              if [ "${#INSTALLED_EXE[@]}" -eq 0 ]; then
                echo "ERROR: 源码构建没有安装任何 Windows executable"
                exit 1
              fi
              for exe in "${INSTALLED_EXE[@]}"; do
                rel="${exe#${INST_DIR}/}"
                dest_rel=$(runtime_destinations "${rel}")
                copy_runtime_executable "${exe}" "${dest_rel}"
              done

              mapfile -t PACKAGED_EXE_REL < <(
                find "${ARTIFACT}" -type f -iname '*.exe' \
                  -printf '%P\n' | sort -u
              )
              mapfile -t EXPECTED_EXE_REL < <(
                while IFS= read -r rel; do
                  runtime_destinations "${rel}"
                done < <(find "${INST_DIR}" -type f -iname '*.exe' \
                  \( -path "${INST_DIR}/bin/*" -o -path "${INST_DIR}/libexec/*" \) \
                  -printf '%P\n' | sort -u)
              )
              printf '%s\n' "${EXPECTED_EXE_REL[@]}" | sort -u > "${ARTIFACT}.expected-exe.txt"
              printf '%s\n' "${PACKAGED_EXE_REL[@]}" | sort -u > "${ARTIFACT}.packaged-exe.txt"
              if ! diff -u "${ARTIFACT}.expected-exe.txt" "${ARTIFACT}.packaged-exe.txt"; then
                echo "ERROR: 安装树与 static artifact 的 executable 清单不一致"
                exit 1
              fi
              if find "${ARTIFACT}" -type f ! -iname '*.exe' 2>/dev/null | grep -q .; then
                echo "ERROR: Windows static artifact 包含非 exe 文件"
                find "${ARTIFACT}" -type f ! -iname '*.exe' -print
                exit 1
              fi
              rm -f "${ARTIFACT}.expected-exe.txt" "${ARTIFACT}.packaged-exe.txt"
              duplicate_hashes=$(find "${ARTIFACT}" -type f -iname '*.exe' -print0 \
                | xargs -r -0 sha256sum | awk '{ count[$1]++ } END { for (hash in count) if (count[hash] > 1) print hash, count[hash] }')
              if [ -n "${duplicate_hashes}" ]; then
                echo "ERROR: static artifact 包含重复内容的 executable:"
                echo "${duplicate_hashes}"
                exit 1
              fi
              echo "Windows static 产物 (仅 exe):"
            else
              find "${INST_DIR}" -type f ! -iname '*.exe' -printf '%P\0' \
                | while IFS= read -r -d '' rel; do
                    mkdir -p "${ARTIFACT}/$(dirname "${rel}")"
                    cp "${INST_DIR}/${rel}" "${ARTIFACT}/${rel}"
                  done
              mapfile -t INSTALLED_RUNTIME_EXE < <(
                find "${INST_DIR}/bin" "${INST_DIR}/libexec" -type f -iname '*.exe' | sort
              )
              for exe in "${INSTALLED_RUNTIME_EXE[@]}"; do
                rel="${exe#${INST_DIR}/}"
                dest_rel=$(runtime_destinations "${rel}")
                copy_runtime_executable "${exe}" "${dest_rel}"
              done
              mapfile -t EXPECTED_DYNAMIC_FILES < <(
                find "${INST_DIR}" -type f ! -iname '*.exe' -printf '%P\n'
                while IFS= read -r exe; do
                  rel="${exe#${INST_DIR}/}"
                  runtime_destinations "${rel}"
                done < <(find "${INST_DIR}/bin" "${INST_DIR}/libexec" -type f -iname '*.exe' | sort)
              )
              printf '%s\n' "${EXPECTED_DYNAMIC_FILES[@]}" | sort -u > "${ARTIFACT}.expected-files.txt"
              find "${ARTIFACT}" -type f -printf '%P\n' | sort -u > "${ARTIFACT}.packaged-files.txt"
              mapfile -t MISSING_DYNAMIC_FILES < <(
                comm -23 \
                  "${ARTIFACT}.expected-files.txt" \
                  "${ARTIFACT}.packaged-files.txt"
              )
              if [ "${#MISSING_DYNAMIC_FILES[@]}" -ne 0 ]; then
                echo "ERROR: dynamic artifact 缺少安装树文件:"
                printf '%s\n' "${MISSING_DYNAMIC_FILES[@]}"
                exit 1
              fi
              rm -f "${ARTIFACT}.expected-files.txt" "${ARTIFACT}.packaged-files.txt"
              echo "Windows 产物 (递归包含完整安装树和 helper 路径):"
            fi
            ls -lh "${ARTIFACT}/bin/"
            cd "${ARTIFACT}" && zip -9qr "${GITHUB_WORKSPACE}/${ARTIFACT}.zip" .
            cd "${GITHUB_WORKSPACE}" && rm -rf "${ARTIFACT}"
          else
            # Linux: tar.xz
            cp "${INST_DIR}/bin/"* "${ARTIFACT}/bin/" 2>/dev/null || true
            cd "${ARTIFACT}" && tar -cJf "${GITHUB_WORKSPACE}/${ARTIFACT}.tar.xz" .
            ls -lh "${GITHUB_WORKSPACE}/${ARTIFACT}.tar.xz"
            cd "${GITHUB_WORKSPACE}" && rm -rf "${ARTIFACT}"

            # Linux: .deb 包
            echo "=== 生成 .deb 包 ==="
            VERSION="${{ needs.check-version.outputs.raw_version }}"
            DEB_DIR="${ARTIFACT}-deb"
            mkdir -p "${DEB_DIR}/DEBIAN" "${DEB_DIR}/usr/local/bin"
            printf '%s\n' \
              "Package: gnupg" \
              "Version: ${VERSION}" \
              "Architecture: ${{ matrix.config.deb_arch }}" \
              "Maintainer: github-actions@github.com" \
              "Description: GnuPG - GNU Privacy Guard (statically linked)" \
              " GnuPG is a complete and free implementation of the OpenPGP standard." \
              " Statically linked, works on any Linux distribution." \
              > "${DEB_DIR}/DEBIAN/control"
            cp "${INST_DIR}/bin/"* "${DEB_DIR}/usr/local/bin/"
            dpkg-deb --build "${DEB_DIR}"
            mv "${DEB_DIR}.deb" "${GITHUB_WORKSPACE}/${ARTIFACT}.deb"
            ls -lh "${GITHUB_WORKSPACE}/${ARTIFACT}.deb"
            rm -rf "${DEB_DIR}"
          fi

      - name: 生成 SHA256SUMS
        run: |
          echo "=== 为构建产物生成 SHA256SUMS ==="
          cd "${GITHUB_WORKSPACE}"
          ARTIFACT="${{ matrix.config.artifact_name }}"
          # 对该构建任务的所有产物文件（.zip/.tar.xz/.deb）计算校验和
          sha256sum ${ARTIFACT}.* 2>/dev/null > "${ARTIFACT}.SHA256SUMS" || true
          if [ -s "${ARTIFACT}.SHA256SUMS" ]; then
            cat "${ARTIFACT}.SHA256SUMS"
          else
            echo "WARNING: 未找到产物文件，跳过 SHA256SUMS"
          fi

      - name: 生成 Build Manifest
        run: |
          echo "=== 生成构建清单 ==="
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          RAW_VERSION="${{ needs.check-version.outputs.raw_version }}"
          ARTIFACT="${{ matrix.config.artifact_name }}"
          cat > "${GITHUB_WORKSPACE}/${ARTIFACT}.build-manifest.json" <<MANIFEST_EOF
          {
            "build_tool": "GitHub Actions",
            "repository": "${{ github.repository }}",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "run_attempt": "${{ github.run_attempt }}",
            "workflow": "${{ github.workflow }}",
            "actor": "${{ github.actor }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "source": {
              "product": "GnuPG",
              "version": "${RAW_VERSION}",
              "url": "https://www.gnupg.org/ftp/gcrypt/gnupg/gnupg-${RAW_VERSION}.tar.bz2",
              "sig_verified": true,
              "signing_key_fingerprint": "D8692123806F6B982AB1D1B604E4C4B34F25E3B6"
            },
            "build": {
              "platform": "${{ matrix.config.targetos }}",
              "arch": "${{ matrix.config.name }}",
              "artifact_name": "${ARTIFACT}",
              "static": ${{ matrix.config.static }},
              "date": "${BUILD_DATE}",
              "host_os": "${{ runner.os }}",
              "runner_name": "${{ runner.name }}",
              "runner_arch": "${{ runner.arch }}",
              "runner_os": "${{ runner.os }}"
            },
            "files": [
          MANIFEST_EOF
          # Append each artifact file's info
          SEP=""
          for f in "${GITHUB_WORKSPACE}"/${ARTIFACT}.*; do
            [ -f "$f" ] || continue
            BASENAME="${f##*/}"
            case "${BASENAME}" in
              *.SHA256SUMS|*.build-manifest.json|*.provenance.json) continue ;;
            esac
            SIZE=$(stat -c '%s' "$f" 2>/dev/null || stat -f '%z' "$f" 2>/dev/null || echo 0)
            printf '%s    {"name": "%s", "size_bytes": %s}\n' "${SEP}" "${BASENAME}" "${SIZE}"
            SEP=","
          done >> "${GITHUB_WORKSPACE}/${ARTIFACT}.build-manifest.json"
          # Close JSON array and object
          printf '\n  ]\n}\n' >> "${GITHUB_WORKSPACE}/${ARTIFACT}.build-manifest.json"
          echo "构建清单:"
          python3 -m json.tool "${GITHUB_WORKSPACE}/${ARTIFACT}.build-manifest.json" 2>/dev/null \
            || cat "${GITHUB_WORKSPACE}/${ARTIFACT}.build-manifest.json"

      - name: 生成 SLSA Provenance (attest-build-provenance)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ github.workspace }}/${{ matrix.config.artifact_name }}.*

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.artifact_name }}
          path: ${{ github.workspace }}/${{ matrix.config.artifact_name }}.*

  # ========== Job 3: 创建 Release ==========
  create-release:
    needs: [check-version, build]
    if: ${{ always() && needs.check-version.result == 'success' && needs.check-version.outputs.should_build == 'true' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: 检查分支
        uses: actions/checkout@v7

      - name: 下载所有构建产物
        uses: actions/download-artifact@v8

      - name: 生成 Release 信息
        id: release-info
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

      - name: 创建 Git Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-version.outputs.version }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -f "${TAG}"
          git push origin "${TAG}" --force

      - name: 聚合 SHA256SUMS 并生成 Release 清单
        run: |
          echo "=== 聚合各构件的 SHA256SUMS ==="
          # 收集所有构件目录下的 *.SHA256SUMS, 合并为一份总清单
          COMBINED_SHA256="SHA256SUMS"
          : > "${COMBINED_SHA256}"
          for dir in gnupg-*; do
            [ -d "$dir" ] || continue
            for sums_file in "$dir"/*.SHA256SUMS; do
              [ -f "$sums_file" ] || continue
              cat "$sums_file" >> "${COMBINED_SHA256}"
              echo "" >> "${COMBINED_SHA256}"
            done
            # 同时对该构件内的 build-manifest 计算校验和
            for mf in "$dir"/*.build-manifest.json; do
              [ -f "$mf" ] || continue
              sha256sum "$mf" >> "${COMBINED_SHA256}"
            done
          done
          echo "=== 总 SHA256SUMS ==="
          cat "${COMBINED_SHA256}"

          echo "=== 生成 Release 总 Build Manifest ==="
          RAW_VERSION="${{ needs.check-version.outputs.raw_version }}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > "release-manifest.json" <<RELEASEMF
          {
            "release": "GnuPG ${{ needs.check-version.outputs.version }}",
            "source": {
              "product": "GnuPG",
              "version": "${RAW_VERSION}",
              "url": "https://www.gnupg.org/ftp/gcrypt/gnupg/gnupg-${RAW_VERSION}.tar.bz2",
              "sig_verified": true,
              "signing_key_fingerprint": "D8692123806F6B982AB1D1B604E4C4B34F25E3B6"
            },
            "build_date": "${BUILD_DATE}",
            "repository": "${{ github.repository }}",
            "run_id": "${{ github.run_id }}",
            "workflow": "${{ github.workflow }}",
            "artifacts": [
          RELEASEMF
          SEP=""
          for dir in gnupg-*; do
            [ -d "$dir" ] || continue
            for f in "$dir"/gnupg-*.{tar.xz,deb,zip}; do
              [ -f "$f" ] || continue
              BASENAME="${f##*/}"
              SIZE=$(stat -c '%s' "$f" 2>/dev/null || stat -f '%z' "$f" 2>/dev/null || echo 0)
              printf '%s    {"name": "%s", "size_bytes": %s}\n' "${SEP}" "${BASENAME}" "${SIZE}"
              SEP=","
            done 2>/dev/null
          done >> "release-manifest.json"
          printf '\n  ]\n}\n' >> "release-manifest.json"
          python3 -m json.tool "release-manifest.json" 2>/dev/null || cat "release-manifest.json"

      - name: 生成 SLSA Provenance (attest-build-provenance)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ github.workspace }}/gnupg-*.{tar.xz,deb,zip,SHA256SUMS,build-manifest.json}

      - name: 打包所有产物到 Release
        run: |
          mkdir -p release-assets
          # 收集所有构件目录下的产物
          for dir in gnupg-*; do
            [ -d "$dir" ] || continue
            find "$dir" -type f | while read -r file; do
              [ -f "$file" ] || continue
              cp "$file" release-assets/
              ls -lh "$file"
            done
          done
          # 复制总 SHA256SUMS 和 release manifest 到产物目录
          cp SHA256SUMS release-assets/
          cp release-manifest.json release-assets/
          echo "Release 产物列表:"
          ls -lh release-assets/

      - name: 创建 GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.release-info.outputs.version }}
          name: GnuPG ${{ steps.release-info.outputs.version }}
          body: |
            ## 中文

            通过 GitHub Actions 自动从 GnuPG 官网抓取源码并完成构建。编译使用的源码文件已通过 GnuPG 官方发布的签名校验。


            每个构建产物均附带：
            - **SHA256SUMS** — SHA-256 校验和清单（用于验证文件完整性）
            - **build-manifest.json** — 构建清单（版本、平台、构建参数）
            - **SLSA Provenance** — 通过 `attest-build-provenance` 生成的构建来源证明

            ### 包含文件
            - **gpg** — GnuPG 核心加密工具
            - **gpg-agent** — GPG 代理（私钥缓存）
            - **gpgconf** — 配置工具
            - **gpgsm** — S/MIME 支持
            - **gpgv** — 签名验证工具
            - **gpgtar** — 加密归档工具
            - **gpg-card** — OpenPGP 卡片管理
            - **dirmngr** — 证书目录管理器
            - **keyboxd** — 密钥盒守护进程

            ### 构建平台
            | 文件名 | 架构 | 类型 |
            |---|---|---|
            | gnupg-linux-amd64.tar.xz | Linux x86_64 | 静态二进制 tar.xz |
            | gnupg-linux-amd64.deb | Linux x86_64 | Debian/Ubuntu .deb 包 |
            | gnupg-linux-arm64.tar.xz | Linux ARM64 | 静态二进制 tar.xz |
            | gnupg-linux-arm64.deb | Linux ARM64 | Debian/Ubuntu .deb 包 |
            | gnupg-windows-w64.zip | Windows 64-bit | .exe + DLL |
            | gnupg-windows-w64-static.zip | Windows 64-bit | 第三方依赖静态链接（仅 exe） |

            ### 验证方法

            ```bash
            # 1. 验证文件完整性
            sha256sum -c SHA256SUMS

            # 2. 查看构建清单
            cat build-manifest.json

            # 3. SLSA Provenance 可在 GitHub Releases 页面查看
            ```

            构建时间：${{ steps.release-info.outputs.build_date }}

            ---

            ## English

            Automatically built from the official GnuPG source via GitHub Actions. Source integrity verified with GnuPG official signature.

            ## Integrity Verification

            Each build artifact includes:
            - **SHA256SUMS** — SHA-256 checksum manifest
            - **build-manifest.json** — Build metadata (version, platform, config)
            - **SLSA Provenance** — Build provenance attestation via `attest-build-provenance`

            ### Included Files
            - **gpg** — Core GnuPG encryption tool
            - **gpg-agent** — GPG agent (private key cache)
            - **gpgconf** — Configuration tool
            - **gpgsm** — S/MIME support
            - **gpgv** — Signature verification tool
            - **gpgtar** — Encrypted archive tool
            - **gpg-card** — OpenPGP card management
            - **dirmngr** — Certificate directory manager
            - **keyboxd** — Keybox daemon

            ### Build Platforms
            | File Name | Architecture | Type |
            |---|---|---|
            | gnupg-linux-amd64.tar.xz | Linux x86_64 | Static binary tar.xz |
            | gnupg-linux-amd64.deb | Linux x86_64 | Debian/Ubuntu .deb package |
            | gnupg-linux-arm64.tar.xz | Linux ARM64 | Static binary tar.xz |
            | gnupg-linux-arm64.deb | Linux ARM64 | Debian/Ubuntu .deb package |
            | gnupg-windows-w64.zip | Windows 64-bit | .exe + DLL |
            | gnupg-windows-w64-static.zip | Windows 64-bit | Third-party dependencies statically linked (exe only) |

            ### Verification

            ```bash
            # 1. Verify file integrity
            sha256sum -c SHA256SUMS

            # 2. Inspect build manifest
            cat build-manifest.json

            # 3. SLSA Provenance available on GitHub Releases page
            ```

            Build Date: ${{ steps.release-info.outputs.build_date }}
          artifacts: release-assets/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          makeLatest: true
